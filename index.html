          <li><strong>Generate for free, download when satisfied</strong> — Preview is free with no credit card. Pay $4.99 for a single HD download or $9.99 for all platform sizes as a ZIP.</li>

        <h2>Identity Preservation Technology</h2>
        <p>Most AI headshot tools subtly alter your appearance — changing eye color, lightening skin tone, or smoothing features until the result looks like an attractive stranger rather than you. ProPortrait AI's identity lock system lets you pin each feature individually:</p>
        <ul>
          <li>Eye color — locked to your natural shade</li>
          <li>Skin tone — exact tone preserved, not lightened or darkened</li>
          <li>Hair length — prevents shortcuts or extensions the AI might add</li>
          <li>Hair texture — preserves curls, waves, or straight hair</li>
          <li>Glasses — choose to preserve or remove</li>
        </ul>
        <p>A naturalness slider (0–100) prevents over-smoothing. At 70–80, the result looks polished but still recognizably human. At 100, the AI preserves natural skin texture, fine lines, and realistic lighting.</p>
