name: Deploy ProPortrait

on:
  push:
    branches: [main]

env:
  PROJECT: ai-biz-6b7ec
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev/ai-biz-6b7ec/proportrait/api

jobs:
  lint:
    name: Lint & Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm audit --audit-level=high

  deploy-backend:
    name: Deploy Backend → Cloud Run
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet
          gcloud auth print-access-token | docker login -u oauth2accesstoken --password-stdin https://${{ env.REGION }}-docker.pkg.dev

      - name: Build & push Docker image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -f server/Dockerfile \
            -t ${{ env.REGISTRY }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}:latest \
            --push \
            .

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy proportrait-api \
            --image ${{ env.REGISTRY }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --timeout 120s \
            --set-secrets "GEMINI_API_KEY=GEMINI_API_KEY:latest,R2_ACCOUNT_ID=R2_ACCOUNT_ID:latest,R2_ACCESS_KEY_ID=R2_ACCESS_KEY_ID:latest,R2_SECRET_ACCESS_KEY=R2_SECRET_ACCESS_KEY:latest,R2_BUCKET_NAME=R2_BUCKET_NAME:latest,RESEND_API_KEY=RESEND_API_KEY:latest,RESEND_FROM_EMAIL=RESEND_FROM_EMAIL:latest,ADMIN_EMAIL=ADMIN_EMAIL:latest" \
            --set-env-vars "NODE_ENV=production,CORS_ORIGIN=https://proportrait.ai"

  deploy-frontend:
    name: Deploy Frontend → Firebase Hosting
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_URL: https://proportrait-api-22835475779.us-central1.run.app
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: https://eu.i.posthog.com
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PORTRAIT_7B01D }}
          projectId: portrait-7b01d
          channelId: live
